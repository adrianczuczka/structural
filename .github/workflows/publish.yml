name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          tag="${{ github.event.release.tag_name }}"
          expected="${tag#v}"
          actual=$(grep -oE 'releaseVersion = "[^"]+"' core/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$expected" != "$actual" ]; then
            echo "::error::Release tag $tag (parsed as $expected) does not match releaseVersion $actual in core/build.gradle.kts"
            exit 1
          fi

      - name: Run tests
        run: ./gradlew :core:test

      - name: Deploy to Maven Central Portal staging
        env:
          ORG_GRADLE_PROJECT_MavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_MavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :core:deployCentralPortal --stacktrace
