name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          tag="${{ github.event.release.tag_name }}"
          expected="${tag#v}"
          actual=$(grep -oE 'releaseVersion = "[^"]+"' core/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$expected" != "$actual" ]; then
            echo "::error::Release tag $tag (parsed as $expected) does not match releaseVersion $actual in core/build.gradle.kts"
            exit 1
          fi

      - name: Run tests
        run: ./gradlew :core:test

      # signing.key / signing.password contain dots, so they can't be passed via
      # ORG_GRADLE_PROJECT_* env vars. Inject them as project ext properties via
      # an init script — findProperty() (and therefore the deployer's secret())
      # picks them up.
      - name: Configure signing properties
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle.kts <<'EOF'
          gradle.beforeProject {
              System.getenv("SIGNING_KEY")?.let { extra["signing.key"] = it }
              System.getenv("SIGNING_PASSWORD")?.let { extra["signing.password"] = it }
          }
          EOF

      - name: Deploy to Maven Central Portal staging
        env:
          ORG_GRADLE_PROJECT_MavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_MavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew :core:deployCentralPortal
